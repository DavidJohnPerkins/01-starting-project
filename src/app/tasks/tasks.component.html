@if(isAddingTask) {
    <app-new-task [userId]="userId" (close)="onCloseAddTask()"/>
}

<section id="tasks">
    <header>
        <h2>{{ name }}'s Tasks</h2>
        <menu>
            <button (click)="onStartAddTask()">Add Task</button>
        </menu>
    </header>

    <ul id="tasks">
        @for(t of getSelectedUserTasks(); track t.id) {
            <li>
                <app-task [task]="t"/>
            </li>
        }
    </ul>
</section>
